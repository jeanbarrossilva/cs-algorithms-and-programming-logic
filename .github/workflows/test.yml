name: Test
on:
  push:
    branches: [ 'main' ]
  pull_request:
    branches: [ 'main' ]
jobs:
  test:
    runs-on: macos-26
    steps:
    - uses: actions/checkout@v4
    - name: Select Xcode
      run: sudo xcode-select --switch /Applications/Xcode_26.4.app
    - name: Build
      run: swift build --verbose
    - name: Test
      run: swift test --verbose
